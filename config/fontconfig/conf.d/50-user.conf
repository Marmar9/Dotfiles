<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Set a fallback for sans-serif to Noto Sans CJK SC for Chinese, Noto Sans CJK JP for Japanese, and Noto Sans CJK KR for Korean -->
  <match>
    <test name="lang" compare="contains">
      <string>zh</string>
    </test>
    <edit name="family" mode="prepend">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>

</fontconfig>

